services:
  - type: web
    name: barber-api
    env: node
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: RATE_LIMIT_MAX
        value: 200
      - key: EMAIL_ENABLED
        value: false
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-domain.vercel.app
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false

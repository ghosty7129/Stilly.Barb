version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stilly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stilly_pass}
      POSTGRES_DB: ${POSTGRES_DB:-stillydb}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  # Optional: pgAdmin for convenience (comment out if not needed)
  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "8080:80"

volumes:
  db_data:
